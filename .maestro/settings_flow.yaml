appId: com.anonymous.expoweather
---
# Reach the authenticated Home screen.
- runFlow: login_flow.yaml

# Wait for Home, then open Settings.
- extendedWaitUntil:
    visible:
      id: "details-hint"
    timeout: 30000
- tapOn:
    id: "settings-button"

- extendedWaitUntil:
    visible:
      id: "settings-title"
    timeout: 10000

# Unit + language toggles
- assertVisible:
    id: "temp-toggle-celsius"
- assertVisible:
    id: "temp-toggle-fahrenheit"
- assertVisible:
    id: "wind-toggle-kmh"
- assertVisible:
    id: "wind-toggle-mph"
- assertVisible:
    id: "language-toggle-system"
- assertVisible:
    id: "language-toggle-en"
- assertVisible:
    id: "language-toggle-ja"
- assertVisible:
    id: "weather-alerts-switch"

# Temperature unit toggle (default Celsius -> Fahrenheit; testID reflects state)
- assertVisible:
    id: "temp-desc-celsius"
- tapOn:
    id: "temp-toggle-fahrenheit"
- assertVisible:
    id: "temp-desc-fahrenheit"

# Lower section (scroll into view).
# Test Notification, Test Crash, and Test Non-Fatal buttons are intentionally skipped.
- scrollUntilVisible:
    element:
      id: "account-value"
    direction: DOWN
- scrollUntilVisible:
    element:
      id: "sign-out-button"
    direction: DOWN

# Back navigation returns to Home (header back button is fixed).
- tapOn:
    id: "settings-back-button"
- assertVisible:
    id: "search-input"
