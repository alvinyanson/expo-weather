name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when new commits are pushed to the same PR to save compute time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # Explicitly restrict GITHUB_TOKEN permissions
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup pnpm BEFORE Node so that setup-node can execute `pnpm store path` to locate the cache
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm' # Caches the pnpm global store to drastically speed up installations

      # Enforce frozen-lockfile to ensure deterministic builds and prevent hidden dependency drift
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm run test
